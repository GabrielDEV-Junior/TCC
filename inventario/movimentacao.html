<!-- Mesmo layout da anterior -->
<span class="navbar-brand mb-0 h1">Movimentações</span>
<!-- Conteúdo principal -->
<div class="container">
  <form>
    <div class="mb-3">
      <label for="ativo" class="form-label">Ativo</label>
      <input type="text" class="form-control" id="ativo" placeholder="Notebook Dell">
    </div>
    <div class="mb-3">
      <label for="tipo" class="form-label">Tipo de Movimentação</label>
      <select class="form-select" id="tipo">
        <option>Entrada</option>
        <option>Saída</option>
        <option>Transferência</option>
      </select>
    </div>
    <div class="mb-3">
      <label for="destino" class="form-label">Local de Destino</label>
      <input type="text" class="form-control" id="destino" placeholder="Departamento de TI">
    </div>
    <div class="mb-3">
      <label for="data" class="form-label">Data</label>
      <input type="date" class="form-control" id="data">
    </div>
    <button type="submit" class="btn btn-primary">Registrar Movimentação</button>
  </form>
</div>
