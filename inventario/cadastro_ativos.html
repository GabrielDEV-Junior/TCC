<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cadastro de Ativos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar d-flex flex-column p-3">
    <h4 class="text-center mb-4">Inventário</h4>
    <a href="index.html"><i class="fas fa-home"></i> Dashboard</a>
    <a href="cadastro-ativos.html"><i class="fas fa-box"></i> Ativos</a>
    <a href="movimentacoes.html"><i class="fas fa-exchange-alt"></i> Movimentações</a>
    <a href="relatorios.html"><i class="fas fa-chart-line"></i> Relatórios</a>
    <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sair</a>
  </div>

  <!-- Conteúdo -->
  <div class="content">
    <nav class="navbar navbar-light bg-light mb-4">
      <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">Cadastro de Ativos</span>
        <span class="text-muted">Usuário Logado</span>
      </div>
    </nav>

    <div class="container">
      <form>
        <div class="mb-3">
          <label for="nome" class="form-label">Nome do Ativo</label>
          <input type="text" class="form-control" id="nome" placeholder="Ex: Notebook Dell">
        </div>
        <div class="mb-3">
          <label for="descricao" class="form-label">Descrição</label>
          <textarea class="form-control" id="descricao" rows="3" placeholder="Ex: Notebook i7, 16GB RAM, SSD 512GB"></textarea>
        </div>
        <div class="mb-3">
          <label for="categoria" class="form-label">Categoria</label>
          <select class="form-select" id="categoria">
            <option>Informática</option>
            <option>Veículo</option>
            <option>Imóvel</option>
            <option>Outros</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="patrimonio" class="form-label">Nº de Patrimônio</label>
          <input type="text" class="form-control" id="patrimonio" placeholder="Ex: 123456">
        </div>
        <button type="submit" class="btn btn-primary">Cadastrar</button>
      </form>
    </div>
  </div>

  <script src="js/script.js"></script>
  <script>
    if (!localStorage.getItem("logado")) {
      window.location.href = "login.html";
    }
  </script>
</body>
</html>
